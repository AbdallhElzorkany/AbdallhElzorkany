name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
        
      # Ocean snake
      - name: Generate Snake (Ocean)
        uses: Platane/snk@v3
        with:
          github_user_name: AbdallhElzorkany
          outputs: |
            dist/snake-neon.svg?color_snake=#00ff88&color_dots=#161B22,#0E4429,#006D32,#26A641,#39D353

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add dist/
          git diff --staged --quiet || git commit -m "🐍 Update snake animations"
          
          # Pull latest changes to avoid push rejection
          git pull --rebase origin main || true
          
          git push origin main || true
